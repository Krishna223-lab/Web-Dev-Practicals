<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Details Form</title>
</head>
<body>
  <form action="Mobiledetails" method="post">
    <h2>Mobile Details Form</h2>
    <table>
      <tr>
        <td>Model Number</td>
        <td><input type="text" name="ModelId" required></td>
      </tr>
      <tr>
        <td>Mobile Price</td>
        <td><input type="number" name="Price" min="0" required></td>
      </tr>
      <tr>
        <td>Mobile Company</td>
        <td><input type="text" name="Company" required></td>
      </tr>
      <tr>
        <td>Mobile Color</td>
        <td><input type="text" name="Color" required></td>
      </tr>
      <tr>
        <td><input type="reset" value="Reset"></td>
        <td><input type="submit" value="Register"></td>
      </tr>
    </table>
  </form>
</body>
</html>
