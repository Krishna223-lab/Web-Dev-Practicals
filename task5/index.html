<!DOCTYPE html>
<html>
<head>
  <title>Student Details Application</title>

  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <link rel="stylesheet" href="https://jsdelivr.com">

  <script>
    let app = angular.module ('studentApp', []) ;
    app.controller ('studentCtrl', ($scope) => {
      $scope.students = [] ;
      $scope.name = "" ;
        $scope.cgpa = "" ;
      $scope.addStudent = () => {
        let student = {
          name : $scope.name, 
          cgpa : $scope.cgpa
        } ;
        $scope.students.push (student); 
      }
    }) ;
  </script>

</head>
  <body ng-app= "studentApp">
    <h1>Student Details Application</h1>
    <div ng-controller="studentCtrl">
      <h3>Enter Student Details : </h3>
      <label>Name :</label>
      <input type="text" ng-model="name" placeholder="Enter Student's name">
      <br>

      <label>CGPA : </label>
      <input type="number" ng-model="cgpa" placeholder="Enter student's CGPA"
      step="0.01" min="0" max="10">

      <button ng-click="addStudent()">Add Student</button>

      <h3>
        List of Students
      </h3>
      <table ng-show="students.length > 0">
        <tr>
          <th>Name</th>
          <th>CGPA</th>
        </tr>
        <tr ng-repeat="student in students">
          <td>{{student.name}}</td>
          <td>{{student.cgpa}}</td>
        </tr>
      </table>

      <p ng-show="students.length == 0">No students added yet!</p>

    </div>
  </body>
</html>
